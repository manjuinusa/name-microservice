<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Name Service</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #fff;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
        }
        h1 { margin: 0 0 8px; font-size: 24px; }
        p.sub { margin: 0 0 24px; color: #666; font-size: 14px; }
        label { display: block; font-size: 13px; color: #333; margin: 12px 0 6px; font-weight: 600; }
        input {
            width: 100%;
            padding: 10px 12px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }
        input:focus { border-color: #667eea; }
        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            background: #667eea;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover { background: #5568d3; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        .result {
            margin-top: 20px;
            padding: 14px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }
        .result.success { background: #e6f7ec; color: #1e6b3a; display: block; }
        .result.error   { background: #fde8e8; color: #9b1c1c; display: block; }
        pre { margin: 8px 0 0; white-space: pre-wrap; font-size: 12px; }
    </style>
</head>
<body>
<div class="card">
    <h1>Welcome</h1>
    <p class="sub">Microservices demo — submitted via web-service &rarr; name-service.</p>

    <form id="form">
        <label for="firstName">First name</label>
        <input id="firstName" name="firstName" required maxlength="50" autocomplete="given-name" />

        <label for="lastName">Last name</label>
        <input id="lastName" name="lastName" required maxlength="50" autocomplete="family-name" />

        <button type="submit" id="submitBtn">Submit</button>
    </form>

    <button type="button" id="listBtn" style="margin-top:8px; background:#fff; color:#667eea; border:1px solid #667eea;">
        Show all stored names
    </button>

    <div id="result" class="result"></div>
</div>

<script>
    const form = document.getElementById('form');
    const result = document.getElementById('result');
    const btn = document.getElementById('submitBtn');
    const listBtn = document.getElementById('listBtn');

    listBtn.addEventListener('click', async () => {
        result.className = 'result';
        result.textContent = '';
        listBtn.disabled = true;
        listBtn.textContent = 'Loading...';
        try {
            const res = await fetch('/api/list');
            const data = await res.json();
            if (res.ok) {
                result.classList.add('success');
                const count = Array.isArray(data) ? data.length : 0;
                result.innerHTML = '<strong>' + count + ' name(s) stored</strong>'
                    + '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } else {
                result.classList.add('error');
                result.textContent = 'Error: ' + (data.error || res.statusText);
            }
        } catch (err) {
            result.classList.add('error');
            result.textContent = 'Network error: ' + err.message;
        } finally {
            listBtn.disabled = false;
            listBtn.textContent = 'Show all stored names';
        }
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        result.className = 'result';
        result.textContent = '';
        btn.disabled = true;
        btn.textContent = 'Submitting...';

        const payload = {
            firstName: document.getElementById('firstName').value.trim(),
            lastName:  document.getElementById('lastName').value.trim()
        };

        try {
            const res = await fetch('/api/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if (res.ok) {
                result.classList.add('success');
                result.innerHTML = '<strong>' + data.greeting + '</strong>'
                    + '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } else {
                result.classList.add('error');
                result.textContent = 'Error: ' + (data.error || res.statusText);
            }
        } catch (err) {
            result.classList.add('error');
            result.textContent = 'Network error: ' + err.message;
        } finally {
            btn.disabled = false;
            btn.textContent = 'Submit';
        }
    });
</script>
</body>
</html>
